<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Widget - SWautomation.io</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
 
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
    }
 
    /* ─── LAUNCHER BUTTON ─── */
    #chat-launcher {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 62px;
      height: 62px;
      border-radius: 50%;
      background: linear-gradient(135deg, #54dde4 0%, #0e0c3a 100%);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 24px rgba(14,12,58,0.38);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      z-index: 9999;
    }
    #chat-launcher:hover {
      transform: scale(1.07);
      box-shadow: 0 8px 32px rgba(14,12,58,0.48);
    }
    #chat-launcher.open .icon-chat { display: none; }
    #chat-launcher.open .icon-close { display: block !important; }
 
    /* ─── WIDGET PANEL ─── */
    #chat-widget {
      position: fixed;
      bottom: 104px;
      right: 28px;
      width: 380px;
      height: 560px;
      background: #fff;
      border-radius: 22px;
      box-shadow: 0 12px 60px rgba(14,12,58,0.18), 0 2px 8px rgba(0,0,0,0.06);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 9998;
      transform: scale(0.94) translateY(18px);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.28s cubic-bezier(.34,1.56,.64,1), opacity 0.22s ease;
    }
    #chat-widget.open {
      transform: scale(1) translateY(0);
      opacity: 1;
      pointer-events: all;
    }
 
    /* ─── HEADER ─── */
    .widget-header {
      background: #fff;
      padding: 18px 20px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #f0f0f5;
      flex-shrink: 0;
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 11px;
    }
    .header-logo {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      object-fit: contain;
      background: #f5f5fb;
      padding: 3px;
    }
    .header-name {
      font-size: 15px;
      font-weight: 600;
      color: #0e0c3a;
    }
    .header-close {
      background: none;
      border: none;
      cursor: pointer;
      color: #bbb;
      padding: 5px;
      border-radius: 7px;
      transition: background 0.15s, color 0.15s;
      display: flex;
    }
    .header-close:hover { background: #f4f4f8; color: #555; }
 
    /* ─── WELCOME SCREEN ─── */
    #welcome-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 28px 32px;
      text-align: center;
      gap: 24px;
    }
    .welcome-text {
      font-size: 24px;
      font-weight: 600;
      color: #0e0c3a;
      line-height: 1.3;
    }
    .welcome-btn {
      background: linear-gradient(135deg, #54dde4 0%, #0e0c3a 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 15px 32px;
      font-size: 15px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 9px;
      transition: opacity 0.2s, transform 0.15s;
      width: 100%;
      justify-content: center;
    }
    .welcome-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .response-time {
      font-size: 13px;
      color: #aaa;
      margin-top: -10px;
    }
 
    /* ─── CHAT SCREEN ─── */
    #chat-screen {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }
    #chat-screen.active { display: flex; }
 
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 18px 10px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }
    .messages-area::-webkit-scrollbar { width: 4px; }
    .messages-area::-webkit-scrollbar-thumb { background: #e0e0ea; border-radius: 4px; }
 
    /* Suggestion chips */
    .suggestion-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      padding: 4px 0 10px;
    }
    .chip {
      background: #fff;
      border: 1.5px solid #e5e5f0;
      border-radius: 24px;
      padding: 9px 18px;
      font-size: 14px;
      color: #0e0c3a;
      font-family: inherit;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.12s;
      white-space: nowrap;
    }
    .chip:hover {
      border-color: #54dde4;
      background: #f0feff;
      transform: translateY(-1px);
    }
 
    /* Messages */
    .msg {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.55;
      animation: msgIn 0.2s ease;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg.user {
      background: linear-gradient(135deg, #0e0c3a 0%, #1c2a6e 100%);
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .msg.bot {
      background: #f4f4f9;
      color: #1a1a2e;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .msg.bot.thinking {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 18px;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #bbb; animation: blink 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0.25} 40%{opacity:1} }
 
    /* ─── INPUT AREA ─── */
    .input-area {
      padding: 12px 14px 16px;
      border-top: 1px solid #f0f0f5;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      flex-shrink: 0;
    }
    .input-area input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 14px;
      font-family: inherit;
      color: #0e0c3a;
      background: transparent;
      padding: 4px 0;
    }
    .input-area input::placeholder { color: #b8b8cc; }
 
    .action-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, opacity 0.15s;
      flex-shrink: 0;
    }
    .action-btn:hover { transform: scale(1.1); }
 
    /* Attach: subtle, uses brand cyan */
    .btn-attach {
      background: none;
      color: #54dde4;
    }
    .btn-attach:hover { opacity: 0.75; }
 
    /* Send: brand gradient */
    .btn-send {
      background: linear-gradient(135deg, #54dde4 0%, #0e0c3a 100%);
      color: #fff;
      box-shadow: 0 2px 10px rgba(14,12,58,0.25);
    }
    .btn-send:hover { opacity: 0.88; }
  </style>
</head>
<body>
 
<!-- ═══ WIDGET PANEL ═══ -->
<div id="chat-widget">
 
  <!-- Header -->
  <div class="widget-header">
    <div class="header-brand">
      <img class="header-logo"
           src="https://i.postimg.cc/NGSs02yS/des.png"
           alt="Emma"
           onerror="this.style.display='none'">
      <span class="header-name">Emma</span>
    </div>
    <button class="header-close" onclick="closeWidget()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
 
  <!-- Welcome Screen -->
  <div id="welcome-screen">
    <div class="welcome-text">Bonjour ! Comment puis-je vous aider aujourd'hui ?</div>
    <button class="welcome-btn" onclick="startChat()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      Poser une question
    </button>
    <span class="response-time">Nous traitons rapidement vos préoccupations.</span>
  </div>
 
  <!-- Chat Screen -->
  <div id="chat-screen">
    <div class="messages-area" id="messages-area">
      <div class="suggestion-chips" id="suggestion-chips"></div>
    </div>
    <div class="input-area">
      <input type="text" id="chat-input" placeholder="Ecrivez votre question" onkeydown="handleKey(event)">
      <!-- Image attach -->
      <label class="action-btn btn-attach" title="Partager une image" style="cursor:pointer;">
        <input type="file" accept="image/*" style="display:none;" onchange="handleImageUpload(this)">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
        </svg>
      </label>
      <!-- Send -->
      <button class="action-btn btn-send" onclick="sendMessage()" title="Envoyer">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>
 
<!-- ═══ LAUNCHER BUTTON ═══ -->
<button id="chat-launcher" onclick="toggleWidget()">
  <svg class="icon-chat" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  </svg>
  <svg class="icon-close" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.3" style="display:none;">
    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
  </svg>
</button>
 
<script>
  // ════════════════════════════════════════════
  //  ✏️  CONFIG — éditez uniquement cette section
  // ════════════════════════════════════════════
  const CONFIG = {
    webhookUrl: 'https://n8n.srv810771.hstgr.cloud/webhook/bb149874-eb95-4fd6-8457-7dad0db0062b/chat',
    webhookRoute: 'general',
 
    // Questions rapides — max 4 recommandé (ajoutez ou supprimez des lignes)
    suggestions: [
      'Comment calculer la paie?',
      'Comment enregistrer un bon de commande?',
      'Comment je peux générer des états financiers?',   // ← décommentez pour activer
      // 'What are your prices?',  // ← décommentez pour activer
    ]
  };
  // ════════════════════════════════════════════
 
  // ─── INIT CHIPS ───
  function renderChips() {
    const container = document.getElementById('suggestion-chips');
    container.innerHTML = '';
    CONFIG.suggestions.forEach(text => {
      const btn = document.createElement('button');
      btn.className = 'chip';
      btn.textContent = text;
      btn.onclick = () => sendText(text);
      container.appendChild(btn);
    });
  }
 
  // ─── WIDGET OPEN/CLOSE ───
  function toggleWidget() {
    const widget = document.getElementById('chat-widget');
    const launcher = document.getElementById('chat-launcher');
    if (widget.classList.contains('open')) {
      widget.classList.remove('open');
      launcher.classList.remove('open');
    } else {
      widget.classList.add('open');
      launcher.classList.add('open');
    }
  }
 
  function closeWidget() {
    document.getElementById('chat-widget').classList.remove('open');
    document.getElementById('chat-launcher').classList.remove('open');
  }
 
  // ─── CHAT FLOW ───
  function startChat() {
    document.getElementById('welcome-screen').style.display = 'none';
    document.getElementById('chat-screen').classList.add('active');
    renderChips();
    document.getElementById('chat-input').focus();
  }
 
  function handleKey(e) {
    if (e.key === 'Enter') sendMessage();
  }
 
  function sendMessage() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    sendText(text);
  }
 
async function sendText(text) {
  document.getElementById('suggestion-chips').style.display = 'none';
  addMessage(text, 'user');

  const botDiv = addMessage('', 'bot');
  let fullText = '';

  try {
    const res = await fetch(CONFIG.webhookUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'sendMessage', chatInput: text, route: CONFIG.webhookRoute })
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value, { stream: true });
      const lines = chunk.split('\n').filter(l => l.trim());

      for (const line of lines) {
        try {
          const parsed = JSON.parse(line);
          if (parsed.type === 'item' && parsed.content) {
            fullText += parsed.content;
            botDiv.innerHTML = formatMessage(fullText);
            document.getElementById('messages-area').scrollTop = 999999;
          }
        } catch {}
      }
    }

    if (!fullText) botDiv.textContent = 'Aucune réponse reçue.';

  } catch (e) {
    botDiv.textContent = 'Une erreur est survenue. Veuillez réessayer.';
  }
}

function formatMessage(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/#{1,3} (.+)/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}
 
function addMessage(text, role) {
  const area = document.getElementById('messages-area');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  
  if (role === 'bot' && text) {
    div.innerHTML = formatMessage(text);
  } else {
    div.textContent = text;
  }
  
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}
 
  function addThinking() {
    const area = document.getElementById('messages-area');
    const div = document.createElement('div');
    div.className = 'msg bot thinking';
    div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
    return div;
  }
 
  function handleImageUpload(input) {
    const file = input.files[0];
    if (!file) return;
    const area = document.getElementById('messages-area');
    document.getElementById('suggestion-chips').style.display = 'none';
    const div = document.createElement('div');
    div.className = 'msg user';
    const img = document.createElement('img');
    img.style.cssText = 'max-width:200px;border-radius:10px;display:block;';
    img.src = URL.createObjectURL(file);
    div.appendChild(img);
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
    input.value = '';
  }
 
  // ─── AUTO-OPEN for demo ───
  setTimeout(() => {
    document.getElementById('chat-widget').classList.add('open');
    document.getElementById('chat-launcher').classList.add('open');
  }, 300);
</script>
</body>
</html>
