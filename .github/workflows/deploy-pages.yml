# Déploie le site (index.html, emma-widget.js, etc.) sur GitHub Pages.
# Génère local.config.js au build à partir du secret EMMA_SECRET (jamais commité).
# Prérequis : Settings → Pages → Source : GitHub Actions.
#
# Secret EMMA_SECRET — une des deux options (le plus simple = 1) :
#   1) Settings → Secrets and variables → Actions → Repository secrets → EMMA_SECRET
#   2) Settings → Environments → github-pages → Environment secrets → EMMA_SECRET

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate local.config.js from EMMA_SECRET
        env:
          EMMA_SECRET: ${{ secrets.EMMA_SECRET }}
        run: |
          if [ -z "${EMMA_SECRET:-}" ]; then
            echo '::error title=Secret manquant::EMMA_SECRET est vide ou absent.'
            echo '::error::Ajoutez un secret nommé exactement EMMA_SECRET :'
            echo '::error::  • (recommandé) Repo → Settings → Secrets and variables → Actions → New repository secret'
            echo '::error::  • (alternative) Settings → Environments → github-pages → Environment secrets'
            echo '::error::Puis relancez ce workflow (Re-run jobs).'
            exit 1
          fi
          node <<'NODE'
          const fs = require('fs');
          const s = process.env.EMMA_SECRET;
          const cfg = {
            webhookHeaders: { 'X-Emma-Secret': s },
            sharedSecret: s,
          };
          const body =
            '// Généré par GitHub Actions au déploiement. Ne pas commiter.\n' +
            'window.__EMMA_LOCAL_CONFIG = ' +
            JSON.stringify(cfg, null, 2) +
            ';\n';
          fs.writeFileSync('local.config.js', body, 'utf8');
          NODE

      - name: Préparer le dossier publié (_site)
        run: |
          mkdir -p _site
          cp index.html emma-widget.js emma-avatar.png EMBED_SNIPPET.html README.md local.config.example.js local.config.js _site/
          : > _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
