<!-- Emma widget embed snippet (copier-coller) -->
<!-- À placer dans le <head> (ou juste avant </body>) -->
<!-- Incrémenter ?v= à chaque release publiée sur GitHub Pages (cache navigateur). -->
<script src="https://stew-nocode.github.io/emmabot/emma-widget.js?v=0.3.4"></script>

<script>
  EmmaChat.init({
    // ── Connexion (OBLIGATOIRE) ──
    webhookUrl:   "https://n8n.srv1336912.hstgr.cloud/webhook/e239be12-d954-4ebf-92e1-d9fca1cbdcca/chat",
    webhookRoute: "general",

    // ── Sécurité (RECOMMANDÉ) ──
    // ⚠️ Si ce snippet est exécuté côté navigateur, ce secret sera visible.
    // Pour une vraie sécurité, passer par un endpoint backend qui ajoute ce header.
    webhookHeaders: {
      "X-Emma-Secret": "A_REMPLACER_PAR_VOTRE_SECRET"
    },
    // Tant que le secret n’est pas configuré côté N8N, retirer le bloc webhookHeaders ci-dessus.

    // ── Session (ATTENDU) ──
    // "browser" (défaut) = 1 session par navigateur (persistée)
    // "tab" = 1 session par onglet
    // "conversation" = nouvelle session à chaque démarrage
    sessionScope: "browser",

    // ── Fiabilité (OPTIONNEL, défauts dans le widget si omis) ──
    // requestTimeoutMs: 90000,
    // timeoutMessage: "Délai dépassé. Veuillez réessayer dans un instant.",
    // Mettre requestTimeoutMs: 0 pour désactiver la limite de temps.

    // ── Agent / Branding (OPTIONNEL) ──
    agentName:   "Emma",
    agentStatus: "En ligne",
    // Remplacer l’URL ou supprimer la ligne logoUrl pour garder le logo par défaut du widget.
    logoUrl:     "https://votre-domaine.com/logo.png",

    // ── Textes (OPTIONNEL) ──
    welcomeText:      "Bonjour ! Comment puis-je vous aider ?",
    buttonText:       "Démarrer la conversation",
    responseTimeText: "Réponse en quelques secondes.",
    inputPlaceholder: "Écrivez votre question...",

    // ── Questions rapides (OPTIONNEL) ──
    suggestions: [
      "Comment calculer la paie ?",
      "Comment enregistrer un bon de commande ?",
      "Comment générer des états financiers ?"
    ],

    // ── Design (OPTIONNEL) ──
    primaryColor: "#3B5BDB",
    position:     "right",
    widgetWidth:  380,
    widgetHeight: 580,
    autoOpen:     false,

    // ── Callbacks (OPTIONNEL) ──
    onOpen:    () => console.log("Widget ouvert"),
    onClose:   () => console.log("Widget fermé"),
    onMessage: (msg) => console.log("[EmmaChat]", msg.role, ":", msg.text),
    // onError: (info) => console.warn("[EmmaChat]", info.kind, info)
  });
</script>
