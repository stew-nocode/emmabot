<!-- ================================================================
     EMMA WIDGET — Snippet d'intégration ERP
     À placer dans le <head> ou juste avant </body>.
     ================================================================ -->
<script src="https://stew-nocode.github.io/emmabot/emma-widget.js?v=0.4.9"></script>

<script>
  EmmaChat.init({

    // Avatar (optionnel) : par défaut emma-avatar.png est résolu depuis l’URL d’emma-widget.js (OK cross-domain ERP).
    // logoUrl: "https://stew-nocode.github.io/emmabot/emma-avatar.png",

    // URL du webhook n8n qui reçoit les messages du chatbot.
    webhookUrl: "VOTRE_URL_WEBHOOK_N8N",

    // Route du workflow (correspond au path configuré dans le trigger n8n).
    webhookRoute: "general",

    // Secret partagé avec n8n pour authentifier les requêtes.
    // ⚠️ Visible côté client — pour une vraie sécurité, passer par un proxy backend.
    webhookHeaders: {
      "X-Emma-Secret": "VOTRE_SECRET_N8N"
    },

    // Identifiant stable de l'utilisateur connecté dans l'ERP.
    // Permet d'isoler la session par utilisateur et de tracer les échanges.
    userId: "ID_UTILISATEUR_ERP",

    // Identifiant de la session de connexion ERP (token, UUID…).
    erpSessionId: "ID_SESSION_ERP",

    // URL ou chemin de la page ERP affichée au moment du message.
    pageUrl: window.location.href

    // (SPA uniquement) Décommenter à la place de pageUrl si l'URL change sans rechargement.
    // getPageUrl: () => window.location.pathname + window.location.search
  });
</script>
